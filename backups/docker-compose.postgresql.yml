services:
  postgres:
    image: postgres:16-alpine
    container_name: iams_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iams}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iams_secret}
      POSTGRES_DB: ${POSTGRES_DB:-iams_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iams_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iams} -d ${POSTGRES_DB:-iams_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iams_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://iams:iams_secret@postgres:5432/iams_db}
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      FLASK_ENV: ${FLASK_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-memory://}
    command: ["/app/entrypoint.sh"]
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - iams_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/auth/csrf-token')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    container_name: iams_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - iams_network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  iams_network:
    driver: bridge
